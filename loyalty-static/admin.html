<!DOCTYPE html>
<html lang="ar-TN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>The Loft Lounge | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#0a0a0a] text-[#f0f0f0]">
    <div class="max-w-md mx-auto min-h-screen relative shadow-2xl shadow-[#D4AF37]/5 pb-24 px-4 pt-6 overflow-hidden">
        <div class="relative z-10 mb-8 animate-slide-up flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-gradient-gold font-[Playfair Display]">Admin View</h1>
                <p class="text-[#888888] text-sm mt-1">Barista Dashboard ☕</p>
            </div>
            <div class="px-3 py-1 rounded-full bg-red-500/10 border border-red-500/30 text-red-400 text-[10px] font-bold uppercase tracking-widest">
              Secure
            </div>
        </div>

        <div class="relative z-10 grid grid-cols-2 gap-4 mb-8 animate-scale-in">
            <button class="card-premium flex flex-col items-center justify-center py-6 border-[#D4AF37]/30">
              <span class="text-3xl mb-2">📸</span>
              <span class="text-xs font-bold uppercase tracking-wider">Scan QR</span>
            </button>
            <button onclick="location.reload()" class="card-premium flex flex-col items-center justify-center py-6">
              <span class="text-3xl mb-2">🔄</span>
              <span class="text-xs font-bold uppercase tracking-wider">Refresh</span>
            </button>
        </div>

        <div class="relative z-10 space-y-4">
            <h3 class="text-sm font-semibold text-[#888888] uppercase tracking-wider mb-2 px-2">Recent Activity</h3>
            <div id="recentActivity" class="space-y-4">
                <!-- Activity Injected -->
                <p class="text-center text-[#888888] italic py-10">Loading activity...</p>
            </div>
        </div>

        <!-- Bottom Nav -->
        <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto glass border-t border-[#D4AF37]/10 px-6 py-3 z-50 flex items-center justify-between safe-bottom">
            <a href="dashboard.html" class="flex flex-col items-center gap-1 text-[#888888]">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase tracking-widest">Home</span>
            </a>
            <a href="leaderboard.html" class="flex flex-col items-center gap-1 text-[#888888]">
                <i data-lucide="trophy" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase tracking-widest">Elite</span>
            </a>
            <div class="w-12 h-12 -mt-10 bg-gradient-to-tr from-[#D4AF37] to-[#e8c84a] rounded-full shadow-lg shadow-[#D4AF37]/20 flex items-center justify-center border-4 border-[#0a0a0a] animate-float">
                 <i data-lucide="coffee" class="text-black w-6 h-6"></i>
            </div>
            <a href="profile.html" class="flex flex-col items-center gap-1 text-[#888888]">
                <i data-lucide="user" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase tracking-widest">Profile</span>
            </a>
            <a href="admin.html" class="nav-active flex flex-col items-center gap-1 text-[#D4AF37] relative">
                <i data-lucide="settings" class="w-6 h-6"></i>
                <span class="text-[10px] uppercase tracking-widest">Admin</span>
            </a>
        </nav>
    </div>

    <script src="app.js"></script>
    <script>
        async function loadActivity() {
            const { data } = await supabase
                .from('check_ins')
                .select('id, created_at, profiles(username, avatar_url)')
                .order('created_at', { ascending: false })
                .limit(10);

            const container = document.getElementById('recentActivity');
            if (!data || data.length === 0) {
                container.innerHTML = `<p class="text-center text-[#888888] italic py-10">Mafamma hadda tawa...</p>`;
                return;
            }

            container.innerHTML = data.map(c => `
                <div class="card-premium flex items-center gap-4 p-4 animate-fade-in">
                    <div class="w-10 h-10 rounded-full overflow-hidden border border-[#2a2a2a] bg-[#111111] flex items-center justify-center text-xs font-bold">
                        ${c.profiles?.avatar_url ? `<img src="${c.profiles.avatar_url}" class="w-full h-full object-cover">` : (c.profiles?.username || '?')[0].toUpperCase()}
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-sm">${c.profiles?.username || 'Unknown'}</p>
                        <p class="text-[10px] text-[#888888]">${new Date(c.created_at).toLocaleTimeString()}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xs font-bold text-[#34D399]">+10 pts</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.addEventListener('load', async () => {
            await initApp();
            if (currentProfile?.role !== 'barista') {
                window.location.href = 'dashboard.html';
                return;
            }
            await loadActivity();
        });
    </script>
</body>
</html>
