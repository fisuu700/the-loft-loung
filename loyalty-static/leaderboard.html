<!DOCTYPE html>
<html lang="ar-TN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>The Loft | Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#f8f9fa] text-[#333]">
    <div class="max-w-md mx-auto min-h-screen pb-24 px-6 pt-10">
        <div class="mb-10 animate-up">
            <h1 class="text-4xl font-bold text-italic text-gold" style="font-family: 'Playfair Display', serif;">Elite Global</h1>
            <p class="text-[#888] text-sm font-medium">Ranking Global 🏆</p>
        </div>

        <!-- Standing Card -->
        <div class="card-clean mb-10 flex items-center gap-5 animate-up" style="animation-delay: 0.1s;">
            <div class="w-14 h-14 rounded-lg bg-gold text-white flex items-center justify-center text-2xl font-bold" style="background-color: #C1A35F;">
                #?
            </div>
            <div>
                <p class="text-[#888] text-[10px] font-bold uppercase tracking-wider">Your Standing</p>
                <h2 class="text-xl font-bold">Checking rank...</h2>
            </div>
        </div>

        <!-- List -->
        <div id="leaderboardList" class="space-y-4 animate-up" style="animation-delay: 0.2s;">
            <h3 class="text-[11px] font-bold text-[#888] uppercase tracking-widest mb-6 border-b border-[#eee] pb-2">Rank of Members</h3>
            <!-- Entries injected here -->
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <i data-lucide="home"></i>
                <span>Home</span>
            </a>
            <a href="leaderboard.html" class="nav-item active">
                <i data-lucide="trophy"></i>
                <span>Elite</span>
            </a>
            <a href="profile.html" class="nav-item">
                <i data-lucide="user"></i>
                <span>Profile</span>
            </a>
            <a href="admin.html" id="adminLink" class="nav-item hidden">
                <i data-lucide="settings"></i>
                <span>Admin</span>
            </a>
        </nav>
    </div>

    <script src="app.js"></script>
    <script>
        async function updateUI() {
            const list = document.getElementById('leaderboardList');
            const data = await getLeaderboard();
            
            list.innerHTML = `<h3 class="text-[11px] font-bold text-[#888] uppercase tracking-widest mb-6 border-b border-[#eee] pb-2">Rank of Members</h3>` + 
                data.map((entry, i) => `
                <div class="card-clean flex items-center gap-4 p-4">
                    <div class="w-6 text-center font-bold ${i < 3 ? 'text-gold' : 'text-[#888]'}">${i+1}</div>
                    <div class="w-10 h-10 rounded-full overflow-hidden border border-[#eee] bg-white flex items-center justify-center text-sm font-bold text-gold">
                        ${entry.avatar_url ? `<img src="${entry.avatar_url}" class="w-full h-full object-cover">` : entry.username[0].toUpperCase()}
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-sm">${entry.username}</p>
                        <p class="text-[9px] uppercase text-[#888] font-bold tracking-wider">Loft Elite ${i===0 ? '👑' : ''}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[#333] font-bold text-lg">${entry.points_count}</p>
                    </div>
                </div>
            `).join('');

            if (currentProfile && currentProfile.role === 'barista') {
                document.getElementById('adminLink').classList.remove('hidden');
            }

            lucide.createIcons();
        }

        window.addEventListener('load', async () => {
            await initApp();
            await updateUI();
        });
    </script>
</body>
</html>
