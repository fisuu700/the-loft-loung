<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Premium - The Loft Lounge</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gold: #D4AF37;
            --sage-green: #8B9A7A;
            --dark-green: #2F5D3E;
            --marble-white: #F8F8F8;
            --soft-pink: #FFB8D1;
            --text-dark: #2c2c2c;
            --text-light: #666;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* Header */
        .header {
            background: white;
            padding: 30px 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-md);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 {
            font-family: 'Playfair Display', serif;
            color: var(--dark-green);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        .header-left p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .refresh-btn {
            background: var(--primary-gold);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            background: #C19E2F;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: var(--shadow-md);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
        }

        .stat-info h3 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-green);
            margin-bottom: 5px;
        }

        .stat-info p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* Tabs */
        .tabs {
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .tab {
            flex: 1;
            padding: 15px 20px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab:hover {
            background: var(--marble-white);
        }

        .tab.active {
            background: var(--dark-green);
            color: white;
        }

        /* Section Container */
        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        /* Reservation Card */
        .reservation-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            border-left: 5px solid var(--primary-gold);
        }

        .reservation-card:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow-lg);
        }

        .reservation-card.confirmed {
            border-left-color: #28a745;
        }

        .reservation-card.cancelled {
            border-left-color: #dc3545;
            opacity: 0.7;
        }

        .reservation-card.completed {
            border-left-color: #6c757d;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-title h3 {
            font-size: 1.5rem;
            color: var(--dark-green);
            font-family: 'Playfair Display', serif;
        }

        .card-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }

        .badge-confirmed {
            background: #d4edda;
            color: #155724;
        }

        .badge-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-completed {
            background: #d1ecf1;
            color: #0c5460;
        }

        .card-content {
            line-height: 1.8;
            color: var(--text-dark);
            font-size: 1.05rem;
        }

        .card-content p {
            margin-bottom: 15px;
        }

        .card-content strong {
            color: var(--dark-green);
            font-weight: 600;
        }

        .highlight-info {
            background: var(--marble-white);
            padding: 15px 20px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 3px solid var(--primary-gold);
        }

        .card-meta {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 0.95rem;
            color: var(--text-light);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-item i {
            color: var(--primary-gold);
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-confirm {
            background: #28a745;
            color: white;
        }

        .btn-confirm:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #dc3545;
            color: white;
        }

        .btn-cancel:hover {
            background: #c82333;
        }

        .btn-complete {
            background: #6c757d;
            color: white;
        }

        .btn-complete:hover {
            background: #5a6268;
        }

        /* Message Card */
        .message-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            position: relative;
            border-left: 5px solid var(--sage-green);
            transition: all 0.3s;
        }

        .message-card:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow-lg);
        }

        .message-card.unread {
            background: #fffef5;
            border-left-color: var(--primary-gold);
        }

        .message-card.replied {
            border-left-color: #28a745;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .sender-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sender-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-gold), var(--sage-green));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .sender-details h4 {
            color: var(--dark-green);
            font-size: 1.2rem;
            margin-bottom: 3px;
        }

        .sender-details p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .message-body {
            background: var(--marble-white);
            padding: 20px;
            border-radius: 10px;
            line-height: 1.8;
            color: var(--text-dark);
            font-size: 1.05rem;
            margin-bottom: 15px;
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 4rem;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--text-dark);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .header {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .card-meta {
                flex-direction: column;
                gap: 10px;
            }

            .card-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <h1><i class="fas fa-crown"></i> The Loft Lounge</h1>
                <p>Tableau de Bord Administrateur</p>
            </div>
            <div class="header-right">
                <button class="refresh-btn" onclick="refreshAll()">
                    <i class="fas fa-sync"></i> Actualiser Tout
                </button>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #FFB8D1, #FF9EC0);">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalReservations">0</h3>
                    <p>Réservations</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #D4AF37, #E8C968);">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h3 id="pendingReservations">0</h3>
                    <p>En Attente</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #8B9A7A, #A8B89D);">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalMessages">0</h3>
                    <p>Messages</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #2F5D3E, #1A3A28);">
                    <i class="fas fa-envelope-open-text"></i>
                </div>
                <div class="stat-info">
                    <h3 id="unreadMessages">0</h3>
                    <p>Non Lus</p>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="reservations">
                <i class="fas fa-calendar-check"></i> Réservations
            </button>
            <button class="tab" data-tab="messages">
                <i class="fas fa-envelope"></i> Messages
            </button>
        </div>

        <!-- Reservations Section -->
        <div id="reservations-section" class="section active">
            <div id="reservationsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement des réservations...</p>
                </div>
            </div>
        </div>

        <!-- Messages Section -->
        <div id="messages-section" class="section">
            <div id="messagesContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Chargement des messages...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                // Remove active class from all tabs
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

                // Add active class to clicked tab
                tab.classList.add('active');
                const tabName = tab.getAttribute('data-tab');
                document.getElementById(`${tabName}-section`).classList.add('active');
            });
        });

        // Refresh all data
        function refreshAll() {
            fetchReservations();
            fetchMessages();
        }

        // Format date to French
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('fr-FR', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // Format time
        function formatTime(timeString) {
            return timeString.substring(0, 5);
        }

        // Get status badge HTML
        function getStatusBadge(status) {
            const badges = {
                pending: '<span class="card-badge badge-pending">En Attente</span>',
                confirmed: '<span class="card-badge badge-confirmed">Confirmée</span>',
                cancelled: '<span class="card-badge badge-cancelled">Annulée</span>',
                completed: '<span class="card-badge badge-completed">Terminée</span>'
            };
            return badges[status] || badges.pending;
        }

        // Fetch Reservations
        async function fetchReservations() {
            const container = document.getElementById('reservationsContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Chargement des réservations...</p></div>';

            try {
                const response = await fetch(`${API_BASE_URL}/reservations`);
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    // Update stats
                    document.getElementById('totalReservations').textContent = result.count;
                    document.getElementById('pendingReservations').textContent =
                        result.data.filter(r => r.status === 'pending').length;

                    // Sort by date (newest first)
                    const sortedData = result.data.sort((a, b) => {
                        return new Date(b.reservation_date) - new Date(a.reservation_date);
                    });

                    // Create reservation cards
                    container.innerHTML = sortedData.map(reservation => `
                        <div class="reservation-card ${reservation.status}">
                            <div class="card-header">
                                <div class="card-title">
                                    <h3><i class="fas fa-user-circle"></i> ${reservation.customer_name}</h3>
                                </div>
                                ${getStatusBadge(reservation.status)}
                            </div>

                            <div class="card-content">
                                <p>
                                    <strong>Demande de réservation</strong> pour <strong>${reservation.guests_count}</strong> 
                                    ${reservation.guests_count > 1 ? 'personnes' : 'personne'} soumise par 
                                    <strong>${reservation.customer_name}</strong>.
                                </p>

                                <div class="highlight-info">
                                    <p style="margin: 0;">
                                        <i class="fas fa-calendar-alt"></i> La réservation est prévue le 
                                        <strong>${formatDate(reservation.reservation_date)}</strong> à 
                                        <strong>${formatTime(reservation.reservation_time)}</strong>.
                                    </p>
                                </div>

                                <p>
                                    <strong>Contact :</strong> Vous pouvez joindre le client au 
                                    <strong>${reservation.customer_phone}</strong>
                                    ${reservation.customer_email ? ` ou par email à <strong>${reservation.customer_email}</strong>` : ''}.
                                </p>

                                ${reservation.special_notes ? `
                                <p>
                                    <strong>Note spéciale du client :</strong><br>
                                    <em>"${reservation.special_notes}"</em>
                                </p>
                                ` : ''}
                            </div>

                            <div class="card-meta">
                                <div class="meta-item">
                                    <i class="fas fa-hashtag"></i>
                                    <span>Réservation #${reservation.id}</span>
                                </div>
                                <div class="meta-item">
                                    <i class="fas fa-clock"></i>
                                    <span>Reçue le ${new Date(reservation.created_at).toLocaleString('fr-FR')}</span>
                                </div>
                            </div>

                            ${reservation.status === 'pending' ? `
                            <div class="card-actions">
                                <button class="btn btn-confirm" onclick="updateReservationStatus(${reservation.id}, 'confirmed')">
                                    <i class="fas fa-check"></i> Confirmer
                                </button>
                                <button class="btn btn-cancel" onclick="updateReservationStatus(${reservation.id}, 'cancelled')">
                                    <i class="fas fa-times"></i> Annuler
                                </button>
                            </div>
                            ` : ''}
                            
                            ${reservation.status === 'confirmed' ? `
                            <div class="card-actions">
                                <button class="btn btn-complete" onclick="updateReservationStatus(${reservation.id}, 'completed')">
                                    <i class="fas fa-check-double"></i> Marquer comme Terminée
                                </button>
                            </div>
                            ` : ''}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-calendar-times"></i>
                            <h3>Aucune réservation</h3>
                            <p>Les réservations apparaîtront ici lorsque les clients effectueront des demandes.</p>
                        </div>
                    `;
                    document.getElementById('totalReservations').textContent = '0';
                    document.getElementById('pendingReservations').textContent = '0';
                }
            } catch (error) {
                console.error('Error fetching reservations:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Erreur de connexion</h3>
                        <p>Impossible de charger les réservations. Assurez-vous que le backend est démarré.</p>
                    </div>
                `;
            }
        }

        // Fetch Messages
        async function fetchMessages() {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Chargement des messages...</p></div>';

            try {
                const response = await fetch(`${API_BASE_URL}/contact`);
                const result = await response.json();

                if (result.success && result.data.length > 0) {
                    // Update stats
                    document.getElementById('totalMessages').textContent = result.count;
                    document.getElementById('unreadMessages').textContent =
                        result.data.filter(m => m.status === 'new').length;

                    // Sort by date (newest first)
                    const sortedData = result.data.sort((a, b) => {
                        return new Date(b.created_at) - new Date(a.created_at);
                    });

                    // Create message cards
                    container.innerHTML = sortedData.map(message => `
                        <div class="message-card ${message.status === 'new' ? 'unread' : ''} ${message.status === 'replied' ? 'replied' : ''}">
                            <div class="message-header">
                                <div class="sender-info">
                                    <div class="sender-avatar">
                                        ${message.name.charAt(0).toUpperCase()}
                                    </div>
                                    <div class="sender-details">
                                        <h4>${message.name}</h4>
                                        <p><i class="fas fa-envelope"></i> ${message.email}</p>
                                    </div>
                                </div>
                                <div>
                                    ${message.status === 'new' ? '<span class="card-badge badge-pending">Nouveau</span>' : ''}
                                    ${message.status === 'read' ? '<span class="card-badge badge-confirmed">Lu</span>' : ''}
                                    ${message.status === 'replied' ? '<span class="card-badge badge-completed">Répondu</span>' : ''}
                                </div>
                            </div>

                            <div class="card-content">
                                <p>
                                    <strong>Message de ${message.name}</strong> reçu le 
                                    <strong>${new Date(message.created_at).toLocaleDateString('fr-FR')}</strong> à 
                                    <strong>${new Date(message.created_at).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}</strong> :
                                </p>

                                <div class="message-body">
                                    "${message.message}"
                                </div>

                                <p>
                                    <strong>Email de contact</strong> : <a href="mailto:${message.email}">${message.email}</a>
                                </p>
                            </div>

                            <div class="card-meta">
                                <div class="meta-item">
                                    <i class="fas fa-hashtag"></i>
                                    <span>Message #${message.id}</span>
                                </div>
                                ${message.read_at ? `
                                <div class="meta-item">
                                    <i class="fas fa-eye"></i>
                                    <span>Lu le ${new Date(message.read_at).toLocaleString('fr-FR')}</span>
                                </div>
                                ` : ''}
                            </div>

                            ${message.status !== 'replied' ? `
                            <div class="card-actions">
                                <button class="btn btn-confirm" onclick="window.location.href='mailto:${message.email}?subject=Re: Votre message'">
                                    <i class="fas fa-reply"></i> Répondre par Email
                                </button>
                                ${message.status === 'new' ? `
                                <button class="btn btn-complete" onclick="updateMessageStatus(${message.id}, 'read')">
                                    <i class="fas fa-check"></i> Marquer comme Lu
                                </button>
                                ` : `
                                <button class="btn btn-complete" onclick="updateMessageStatus(${message.id}, 'replied')">
                                    <i class="fas fa-check-double"></i> Marquer comme Répondu
                                </button>
                                `}
                            </div>
                            ` : ''}
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <h3>Aucun message</h3>
                            <p>Les messages des clients apparaîtront ici.</p>
                        </div>
                    `;
                    document.getElementById('totalMessages').textContent = '0';
                    document.getElementById('unreadMessages').textContent = '0';
                }
            } catch (error) {
                console.error('Error fetching messages:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Erreur de connexion</h3>
                        <p>Impossible de charger les messages. Assurez-vous que le backend est démarré.</p>
                    </div>
                `;
            }
        }

        // Update Reservation Status
        async function updateReservationStatus(id, status) {
            // Messages de confirmation personnalisés
            const confirmMessages = {
                'confirmed': 'Voulez-vous vraiment CONFIRMER cette réservation ?',
                'cancelled': 'Êtes-vous sûr de vouloir ANNULER cette réservation ? Le client sera informé.',
                'completed': 'Marquer cette réservation comme TERMINÉE ?'
            };

            const successMessages = {
                'confirmed': '✅ Réservation confirmée avec succès !',
                'cancelled': '❌ Réservation annulée.',
                'completed': '✔️ Réservation marquée comme terminée.'
            };

            if (!confirm(confirmMessages[status] || 'Voulez-vous vraiment changer le statut de cette réservation ?')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/reservations/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });

                const result = await response.json();

                if (result.success) {
                    alert(successMessages[status] || 'Statut mis à jour avec succès !');
                    fetchReservations(); // Actualiser la liste
                } else {
                    alert(`❌ Erreur : ${result.error || 'Impossible de mettre à jour le statut.'}`);
                }
            } catch (error) {
                alert('❌ Erreur de connexion au serveur. Vérifiez que le backend est démarré.');
                console.error('Erreur détaillée:', error);
            }
        }

        // Update Message Status
        async function updateMessageStatus(id, status) {
            try {
                const response = await fetch(`${API_BASE_URL}/contact/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });

                const result = await response.json();
                if (result.success) {
                    fetchMessages();
                }
            } catch (error) {
                console.error('Error updating message status:', error);
            }
        }

        // Load data on page load
        window.addEventListener('DOMContentLoaded', () => {
            fetchReservations();
            fetchMessages();
        });
    </script>
</body>

</html>
